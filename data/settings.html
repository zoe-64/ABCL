<div id="abcl" class="hidden">
<div id="page-abcl-1" class="page">
    <div id="wettings-messes-category" class="settings-category"> <!-- All mess/wet related --> 
        
        <p class="setting tooltip" id="abcl-mess" data-tooltip="If checked, mess accidents will happen.">
            <label>Messes</label>
            <input type="checkbox" checked> 
        </p>
    
        <p class="setting tooltip" id="abcl-visual" data-tooltip="Controls if accidents are visible on the character.">
            <label>Visual</label>
            <input type="checkbox" checked>
        </p>

        <p class="setting tooltip" id="abcl-wet" data-tooltip="If checked, wet accidents will happen.">
            <label>Wets</label>
            <input type="checkbox" checked>
        </p>

        <p class="setting tooltip" id="abcl-mess-wet-chance" data-tooltip="The chance of a mess accident happening instead of a wet accident.">
            <label>Mess vs Wet</label>
            <input type="range" id="abcl-mess-wet-chance" min="0" max="100" value="50">
        </p>
    
        <p class="setting tooltip" id="abcl-clothing-accidents" data-tooltip="Accidents that happen outside the diaper.">
            <label>Clothing-Accidents</label>
            <input type="checkbox" checked>
        </p>

        <p class="setting tooltip" id="abcl-timer-enabled" data-tooltip="If checked, accidents will happen automatically by the timer.">
            <label>Timer enabled</label>
            <input type="checkbox" checked>
        </p>
        <p class="setting tooltip" id="abcl-timer-duration" data-tooltip="The time between automatic accidents.">
            <label>Timer duration</label>
            <input type="number" value="30" min="5" max="420"><span>minutes</span>
        </p>
    </div>
    <div class="settings-category">
        <p class="setting" id="abcl-message-type">
            <label>Message style:</label>
            <select class="ABCLstyle-interactable" id="abcl-message-type">
                <option value="default">Normal</option>
                <option value="internalMonologue">Internal Monologue</option>
                <option value="embarrassment">Embarressment</option>
            </select>
        </p>
    </div>
    <div class="settings-category">  
    <button id="abcl-reset-button" onclick="document.getElementById('reset-confirm-abcl').showModal()">Reset data</button>
    </div>
    <button class="abcl-exit-button" id="abcl-exit" onclick="PreferenceSubscreenAbclExit()"></button>

</div>

<dialog id="reset-confirm-abcl">
    <p>Are you sure you want to reset all ABCL data?</p>
    <button onclick="Abcl.reset()">Yes</button>
    <button onclick="document.getElementById('reset-confirm-abcl').close()">No</button>
</dialog>
</div>
